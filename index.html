<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parwaaz e Shaheen Academy - Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#f0f7ff] text-[#001f3f] font-sans">
    <div class="flex min-h-screen">
        <!-- Sidebar Overlay (Mobile) -->
        <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden transition-opacity duration-300 opacity-0"></div>
        
        <!-- Sidebar -->
        <aside id="sidebar" class="bg-[#001f3f] text-white flex flex-col fixed inset-y-0 left-0 z-50 transition-all duration-300 w-64 -translate-x-full md:translate-x-0 shadow-2xl md:shadow-none">
            <div class="p-6 border-b border-white/10 flex items-center justify-between">
                <div class="flex items-center gap-3 sidebar-content">
                    <div class="bg-[#ffd700] p-2 rounded-xl shrink-0">
                        <i data-lucide="graduation-cap" class="text-[#001f3f] w-6 h-6"></i>
                    </div>
                    <div class="sidebar-label transition-opacity duration-200">
                        <h1 class="font-bold text-lg leading-tight whitespace-nowrap">Parwaaz e Shaheen</h1>
                    <p class="text-[10px] text-cyan-400 uppercase tracking-widest font-bold">Academy Management v1.8</p>
                    </div>
                </div>
                <button onclick="toggleSidebar()" class="p-2 hover:bg-white/10 rounded-lg transition-colors text-gray-400 hover:text-white">
                    <i id="collapse-icon" data-lucide="chevron-left" class="w-5 h-5"></i>
                </button>
            </div>
            
            <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
                <button onclick="switchTab('dashboard')" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all hover:bg-white/5 active" id="nav-dashboard">
                    <i data-lucide="layout-dashboard" class="w-5 h-5 shrink-0"></i>
                    <span class="font-semibold text-sm sidebar-label transition-opacity duration-200">Dashboard</span>
                </button>
                <button onclick="switchTab('students')" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all hover:bg-white/5" id="nav-students">
                    <i data-lucide="users" class="w-5 h-5 shrink-0"></i>
                    <span class="font-semibold text-sm sidebar-label transition-opacity duration-200">Student Management</span>
                </button>
                <button onclick="switchTab('finance')" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all hover:bg-white/5" id="nav-finance">
                    <i data-lucide="wallet" class="w-5 h-5 shrink-0"></i>
                    <span class="font-semibold text-sm sidebar-label transition-opacity duration-200">Financial & Fee Engine</span>
                </button>
                <button onclick="switchTab('expenses')" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all hover:bg-white/5" id="nav-expenses">
                    <i data-lucide="receipt" class="w-5 h-5 shrink-0"></i>
                    <span class="font-semibold text-sm sidebar-label transition-opacity duration-200">Expense Tracker</span>
                </button>
                <button onclick="switchTab('staff')" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all hover:bg-white/5" id="nav-staff">
                    <i data-lucide="users-round" class="w-5 h-5 shrink-0"></i>
                    <span class="font-semibold text-sm sidebar-label transition-opacity duration-200">Staff & Payroll</span>
                </button>
                <button onclick="switchTab('backup')" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all hover:bg-white/5" id="nav-backup">
                    <i data-lucide="database" class="w-5 h-5 shrink-0"></i>
                    <span class="font-semibold text-sm sidebar-label transition-opacity duration-200">Backup & Restore</span>
                </button>
            </nav>

            <div class="p-4 border-t border-white/10 sidebar-content">
                <div class="bg-cyan-400/10 p-4 rounded-2xl mb-4 border border-cyan-400/20">
                    <p class="text-[10px] text-cyan-400 uppercase font-bold mb-2 sidebar-label">System Status</p>
                    <div class="flex items-center gap-2">
                        <div class="w-2 h-2 bg-[#ffd700] rounded-full animate-pulse shrink-0"></div>
                        <span class="text-xs font-medium sidebar-label text-white">Online & Secure</span>
                    </div>
                </div>
                <button onclick="handleLogout()" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all text-red-400 hover:bg-red-500/10 hover:text-red-300">
                    <i data-lucide="log-out" class="w-5 h-5 shrink-0"></i>
                    <span class="font-semibold text-sm sidebar-label transition-opacity duration-200">Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main id="main-content" class="flex-1 md:ml-64 p-4 md:p-8 transition-all duration-300">
            <!-- Mobile Header -->
            <div class="md:hidden sticky top-0 z-30 flex items-center justify-between mb-6 bg-[#001f3f] p-4 -mx-4 -mt-4 rounded-b-2xl border-b border-[#00fbff]/20 shadow-lg shadow-[#00fbff]/5">
                <div class="flex items-center gap-3">
                    <div class="bg-[#ffd700] p-2 rounded-lg border border-[#ffd700]/30 shadow-sm shadow-[#ffd700]/10">
                        <i data-lucide="graduation-cap" class="text-[#001f3f] w-5 h-5"></i>
                    </div>
                    <h1 class="font-bold text-sm text-[#00fbff]">Parwaaz Academy</h1>
                </div>
                <button onclick="toggleSidebar()" class="p-2 hover:bg-white/10 rounded-lg transition-colors text-cyan-400">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
            </div>

            <div id="view-container">
                <!-- Views will be injected here -->
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="modal-container" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
        <!-- Modal content will be injected here -->
    </div>

    <!-- Notification -->
    <div id="notification" class="fixed bottom-8 right-8 z-[200] transform translate-y-24 transition-transform duration-300">
        <div class="bg-[#001f3f] text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 border border-cyan-400/30">
            <i data-lucide="check-circle" class="text-[#ffd700] w-5 h-5"></i>
            <span id="notification-text" class="font-semibold text-sm"></span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
